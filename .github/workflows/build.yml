name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o quay-linux-amd64 ./cmd/quay

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o quay-linux-arm64 ./cmd/quay

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o quay-darwin-amd64 ./cmd/quay

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o quay-darwin-arm64 ./cmd/quay

      - name: Build Android arm64
        run: GOOS=android GOARCH=arm64 go build -o quay-android-arm64 ./cmd/quay
